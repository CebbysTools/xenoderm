name: "Setup Ghidra"
description: >
  Download, cache, and configure Ghidra + the required JDK.
  Sets GHIDRA_HOME and GHIDRA_HEADLESS environment variables.

inputs:
  ghidra-version:
    description: >
      Ghidra version to install (e.g. "11.1.2") or "latest" to resolve
      automatically via the GitHub Releases API.
    required: false
    default: "latest"
  python-version:
    description: "Version of Python to use for internal scripts."
    required: false
    default: "3.14"

  java-distribution:
    description: >
      JDK distribution passed to actions/setup-java.
      Ghidra 11.x requires Java 17; Ghidra 10.x requires Java 11.
    required: false
    default: "temurin"
  install-path:
    description: >
      Directory where Ghidra will be installed.
      Defaults to {RUNNER_TOOL_CACHE}/ghidra/{version}.
    required: false
    default: ""
  cache:
    description: "Whether to cache the Ghidra installation between runs."
    required: false
    default: "true"

outputs:
  ghidra-home:
    description: "Absolute path to the Ghidra installation directory."
    value: ${{ steps.resolve.outputs.ghidra-home }}
  ghidra-version:
    description: 'Resolved Ghidra version string, e.g. "11.1.2".'
    value: ${{ steps.resolve.outputs.ghidra-version }}
  cache-hit:
    description: '"true" if Ghidra was restored from the runner cache.'
    value: ${{ steps.cache.outputs.cache-hit }}

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Python requirements
      shell: bash
      run: pip install -r ${{ github.action_path }}/requirements.txt

    - name: Resolve Ghidra version and install path
      id: resolve
      shell: bash
      env:
        GHIDRA_VERSION: ${{ inputs.ghidra-version }}
      run: python ${{ github.action_path }}/ghidra_download.py
