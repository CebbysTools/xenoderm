name: Test Custom Actions

# Runs whenever a custom action or this workflow itself changes.
# Each job tests exactly one custom action in isolation.
on:
  push:
    paths:
      - '.github/actions/**'
      - '.github/workflows/test-actions.yml'
  pull_request:
    paths:
      - '.github/actions/**'
      - '.github/workflows/test-actions.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Which action to test (leave blank for all)'
        required: false
        default: ''

# Cancel in-progress runs for the same branch/PR.
concurrency:
  group: test-actions-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Job: test-setup-ghidra
# ---------------------------------------------------------------------------
jobs:
  test-setup-ghidra:
    name: 'setup-ghidra / ${{ matrix.os }} / ghidra ${{ matrix.ghidra-version }}'
    if: >
      github.event.inputs.action == '' ||
      github.event.inputs.action == 'setup-ghidra'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        ghidra-version: ['latest', '11.1.2']

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # ----------------------------------------------------------------
      # Test 1 — Install
      # ----------------------------------------------------------------
      - name: '[install] Setup Ghidra ${{ matrix.ghidra-version }}'
        id: setup
        uses: ./.github/actions/setup-ghidra
        with:
          version: ${{ matrix.ghidra-version }}
          cache: 'true'

      # ----------------------------------------------------------------
      # Test 2 — Smoke: outputs are non-empty and paths exist
      # ----------------------------------------------------------------
      - name: '[smoke] Outputs are set and non-empty'
        shell: python
        env:
          OUT_GHIDRA_HOME: ${{ steps.setup.outputs.ghidra-home }}
          OUT_VERSION:     ${{ steps.setup.outputs.ghidra-version }}
          OUT_CACHE_HIT:   ${{ steps.setup.outputs.cache-hit }}
        run: |
          import os
          import sys

          failures = []
          for var in ("OUT_GHIDRA_HOME", "OUT_VERSION"):
              val = os.environ.get(var, "")
              if not val:
                  failures.append(f"Output '{var}' is empty")
              else:
                  print(f"{var} = {val}")

          print(f"OUT_CACHE_HIT = {os.environ.get('OUT_CACHE_HIT', '')}")

          if failures:
              for msg in failures:
                  print(f"::error::{msg}", file=sys.stderr)
              sys.exit(1)

      - name: '[smoke] GHIDRA_HOME directory exists'
        shell: python
        env:
          GHIDRA_HOME: ${{ steps.setup.outputs.ghidra-home }}
        run: |
          import os
          import sys
          from pathlib import Path

          home = Path(os.environ["GHIDRA_HOME"])
          if not home.is_dir():
              print(f"::error::GHIDRA_HOME directory not found: {home}", file=sys.stderr)
              sys.exit(1)
          print(f"GHIDRA_HOME exists: {home}")

      - name: '[smoke] GHIDRA_HEADLESS executable exists'
        shell: python
        env:
          GHIDRA_HEADLESS: ${{ env.GHIDRA_HEADLESS }}
        run: |
          import os
          import sys
          from pathlib import Path

          headless = Path(os.environ["GHIDRA_HEADLESS"])
          if not headless.is_file():
              print(f"::error::GHIDRA_HEADLESS not found: {headless}", file=sys.stderr)
              sys.exit(1)
          print(f"GHIDRA_HEADLESS exists: {headless}")

      - name: '[smoke] GHIDRA_HOME and GHIDRA_HEADLESS env vars are exported'
        shell: python
        run: |
          import os
          import sys

          missing = [v for v in ("GHIDRA_HOME", "GHIDRA_HEADLESS") if not os.environ.get(v)]
          if missing:
              for v in missing:
                  print(f"::error::Environment variable {v} is not set", file=sys.stderr)
              sys.exit(1)
          print(f"GHIDRA_HOME     = {os.environ['GHIDRA_HOME']}")
          print(f"GHIDRA_HEADLESS = {os.environ['GHIDRA_HEADLESS']}")

      # ----------------------------------------------------------------
      # Test 3 — Functional
      # ----------------------------------------------------------------
      - name: '[functional] analyzeHeadless --help contains expected text'
        shell: python
        run: |
          import os
          import subprocess
          import sys

          headless = os.environ["GHIDRA_HEADLESS"]
          result = subprocess.run(
              [headless, "--help"],
              capture_output=True,
              text=True,
          )
          output = result.stdout + result.stderr
          print(output)

          keywords = ["usage", "analyzeheadless", "ghidra"]
          if not any(kw in output.lower() for kw in keywords):
              print(
                  "::error::analyzeHeadless --help produced unexpected output",
                  file=sys.stderr,
              )
              sys.exit(1)
          print("analyzeHeadless produced expected help text.")

      - name: '[functional] Java version satisfies Ghidra requirement'
        shell: python
        env:
          GHIDRA_VERSION: ${{ steps.setup.outputs.ghidra-version }}
        run: |
          import os
          import re
          import subprocess
          import sys

          result = subprocess.run(
              ["java", "-version"],
              capture_output=True,
              text=True,
          )
          output = result.stdout + result.stderr
          print(output)

          match = re.search(r'"(\d+)', output)
          if not match:
              print("::error::Could not parse Java version from output", file=sys.stderr)
              sys.exit(1)

          java_major    = int(match.group(1))
          ghidra_ver    = os.environ["GHIDRA_VERSION"]
          ghidra_major  = int(ghidra_ver.split(".")[0])
          required_java = 17 if ghidra_major >= 11 else 11

          print(f"Ghidra {ghidra_ver} requires Java >= {required_java}; detected Java {java_major}.")

          if java_major < required_java:
              print(
                  f"::error::Ghidra {ghidra_ver} requires Java {required_java}+, "
                  f"but found Java {java_major}",
                  file=sys.stderr,
              )
              sys.exit(1)

      - name: '[functional] Ghidra support directory has expected layout'
        shell: python
        run: |
          import os
          import sys
          from pathlib import Path

          support = Path(os.environ["GHIDRA_HOME"]) / "support"
          expected = ["analyzeHeadless", "launch.properties", "GhidraServer"]
          missing  = [f for f in expected if not (support / f).exists()
                      and not (support / (f + ".bat")).exists()]

          if missing:
              print(
                  f"::error::Missing expected files in support/: {missing}",
                  file=sys.stderr,
              )
              sys.exit(1)
          print(f"Support directory layout OK: {[p.name for p in support.iterdir()]}")

      # ----------------------------------------------------------------
      # Test 4 — Cache: second install must hit the cache
      # ----------------------------------------------------------------
      - name: '[cache] Install again — expect cache-hit=true'
        id: setup-cached
        uses: ./.github/actions/setup-ghidra
        with:
          version: ${{ steps.setup.outputs.ghidra-version }}
          cache: 'true'

      - name: '[cache] Assert cache was hit on second install'
        shell: python
        env:
          CACHE_HIT: ${{ steps.setup-cached.outputs.cache-hit }}
        run: |
          import os

          cache_hit = os.environ.get("CACHE_HIT", "false")
          if cache_hit != "true":
              # Not a hard failure — cache eviction can happen on some runners
              print(
                  f"::warning::Expected cache-hit=true on second install, "
                  f"got '{cache_hit}'. This may indicate a cache eviction."
              )
          else:
              print("Cache hit confirmed on second install.")

      # ----------------------------------------------------------------
      # Test 5 — Failure case: invalid version must fail
      # ----------------------------------------------------------------
      - name: '[failure] Invalid version should fail'
        id: setup-invalid
        continue-on-error: true
        uses: ./.github/actions/setup-ghidra
        with:
          version: '0.0.0-does-not-exist'
          cache: 'false'

      - name: '[failure] Assert invalid version caused action failure'
        shell: python
        env:
          OUTCOME: ${{ steps.setup-invalid.outcome }}
        run: |
          import os
          import sys

          outcome = os.environ.get("OUTCOME", "")
          if outcome != "failure":
              print(
                  f"::error::Expected action to fail for version "
                  f"'0.0.0-does-not-exist' but outcome was '{outcome}'",
                  file=sys.stderr,
              )
              sys.exit(1)
          print(f"Invalid version correctly caused a failure (outcome={outcome}).")

  # ---------------------------------------------------------------------------
  # Job: summary — collects all test results and reports
  # ---------------------------------------------------------------------------
  summary:
    name: 'Test summary'
    needs: [test-setup-ghidra]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report results
        shell: python
        env:
          RESULT_SETUP_GHIDRA: ${{ needs.test-setup-ghidra.result }}
        run: |
          import os
          import sys

          results = {
              "setup-ghidra": os.environ["RESULT_SETUP_GHIDRA"],
          }

          header = f"{'Action':<25} {'Result':<10}"
          sep    = "-" * len(header)
          print(header)
          print(sep)
          for action, result in results.items():
              icon = "✓" if result == "success" else "✗"
              print(f"{action:<25} {icon} {result}")
          print(sep)

          failed = [a for a, r in results.items() if r == "failure"]
          if failed:
              print(
                  f"\n::error::Failed actions: {', '.join(failed)}",
                  file=sys.stderr,
              )
              sys.exit(1)

          print("\nAll action tests passed.")
